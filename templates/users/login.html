<!DOCTYPE html>
<html lang="es">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ingresar — Bricka</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/bricka.css' %}">
</head>
<body class="bg-background font-sans text-on-surface antialiased">

    <main class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-sm flex flex-col gap-6">

            {# Marca #}
            <div class="flex items-center justify-center gap-3 text-primary">
                {% include "icons/building2.html" with size="24" %}
                <span class="text-[24px] font-semibold tracking-tight">Bricka</span>
            </div>

            {# Card #}
            <div class="bg-surface border border-outline rounded-md p-6 flex flex-col gap-5">

                {% if form.non_field_errors %}
                <div class="px-4 py-3 rounded-lg border text-sm
                            bg-danger-bg border-danger-text/20 text-danger-text">
                    {% for error in form.non_field_errors %}{{ error }}{% endfor %}
                </div>
                {% endif %}

                <form method="post" class="flex flex-col gap-4">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">

                    <div class="flex flex-col gap-1.5">
                        <label for="{{ form.username.id_for_label }}"
                               class="text-[11px] font-medium uppercase tracking-[0.07em] text-on-surface-variant">
                            Email
                        </label>
                        <input type="email" name="username" id="{{ form.username.id_for_label }}"
                               value="{{ form.username.value|default:'' }}"
                               autofocus autocomplete="email" required
                               class="w-full px-3 py-2 text-sm bg-surface border rounded
                                      focus:outline-none focus:ring-2 focus:ring-primary-container/20
                                      focus:border-primary-container transition-colors
                                      {% if form.username.errors %}border-danger-text{% else %}border-outline{% endif %}">
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label for="{{ form.password.id_for_label }}"
                               class="text-[11px] font-medium uppercase tracking-[0.07em] text-on-surface-variant">
                            Contraseña
                        </label>
                        <input type="password" name="password" id="{{ form.password.id_for_label }}"
                               autocomplete="current-password" required
                               class="w-full px-3 py-2 text-sm bg-surface border rounded
                                      focus:outline-none focus:ring-2 focus:ring-primary-container/20
                                      focus:border-primary-container transition-colors
                                      {% if form.password.errors %}border-danger-text{% else %}border-outline{% endif %}">
                    </div>

                    <button type="submit"
                            class="w-full px-4 py-2 rounded bg-primary-container text-on-primary
                                   text-sm font-medium hover:bg-primary transition-colors">
                        Ingresar
                    </button>
                </form>
            </div>

        </div>
    </main>
</body>
</html>
