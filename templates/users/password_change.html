{% extends "base.html" %}

{% block title %}Cambiar contraseña{% endblock %}

{% block page_title %}
<h1 class="text-lg font-semibold truncate">Cambiar contraseña</h1>
{% endblock %}

{% block content %}
<div class="max-w-sm">
    <div class="bg-surface border border-outline rounded-md p-6">
        <form method="post" class="flex flex-col gap-4">
            {% csrf_token %}

            {% for field in form %}
            <div class="flex flex-col gap-1.5">
                <label for="{{ field.id_for_label }}"
                       class="text-[11px] font-medium uppercase tracking-[0.07em] text-on-surface-variant">
                    {{ field.label }}
                </label>
                <input type="password" name="{{ field.html_name }}" id="{{ field.id_for_label }}"
                       autocomplete="{% if field.name == 'old_password' %}current-password{% else %}new-password{% endif %}"
                       required
                       class="w-full px-3 py-2 text-sm bg-surface border rounded
                              focus:outline-none focus:ring-2 focus:ring-primary-container/20
                              focus:border-primary-container transition-colors
                              {% if field.errors %}border-danger-text{% else %}border-outline{% endif %}">
                {% for error in field.errors %}
                <p class="text-sm text-danger-text">{{ error }}</p>
                {% endfor %}
            </div>
            {% endfor %}

            <button type="submit"
                    class="w-full px-4 py-2 rounded bg-primary-container text-on-primary
                           text-sm font-medium hover:bg-primary transition-colors">
                Guardar contraseña nueva
            </button>
        </form>
    </div>
</div>
{% endblock %}
