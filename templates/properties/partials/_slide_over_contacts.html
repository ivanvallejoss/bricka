<div class="px-5 py-4">
    <p class="text-[11px] font-medium uppercase tracking-[0.07em] text-on-surface-variant mb-3">
        Contactos
    </p>
    {% if property.owner_contact %}
        <div class="flex items-center gap-3 p-3 rounded-md bg-surface-container-low border border-outline">
            <div class="w-8 h-8 rounded-full bg-primary-container/10 flex items-center justify-center shrink-0">
                {% include "icons/users.html" with size="14" class="text-primary-container" %}
            </div>
            <div class="min-w-0">
                <p class="text-sm font-medium text-on-surface truncate">
                    {{ property.owner_contact.full_name }}
                </p>
                <p class="text-xs text-on-surface-variant">Propietario</p>
            </div>
        </div>
    {% else %}
        <p class="text-sm text-on-surface-variant">Sin propietario asignado.</p>
    {% endif %}
</div>
