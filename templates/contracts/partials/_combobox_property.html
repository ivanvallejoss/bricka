{% comment %}
Combobox de propiedad para el formulario de contratos.
Al seleccionar, auto-rellena el campo owner si la propiedad tiene propietario.
Requiere x-data del componente padre en contract_create.html.
{% endcomment %}
<div class="flex flex-col gap-1.5">
    <label class="text-[11px] font-medium uppercase tracking-[0.07em] text-on-surface-variant">
        Propiedad *
    </label>
    <input type="hidden" name="property_id" :value="property.id">
    <div class="relative" @click.outside="property.open = false">
        <input type="text"
               x-model="property.text"
               :readonly="property.id !== ''"
               @input="property.open = true; property.id = ''"
               @focus="if (!property.id && property.text.length > 0) property.open = true"
               hx-get="{% url 'properties:search' %}"
               hx-trigger="input changed delay:300ms"
               hx-target="#property-results"
               name="q"
               placeholder="Buscar por dirección, barrio o ciudad..."
               autocomplete="off"
               class="w-full px-3 py-2 pr-9 text-sm bg-surface border rounded
                      focus:outline-none focus:ring-2 focus:ring-primary-container/20
                      focus:border-primary-container transition-colors
                      read-only:bg-surface-container-low read-only:cursor-default
                      {{ form_errors_class }}">
        <button x-show="property.id"
                type="button"
                @click="clearField('property')"
                class="absolute inset-y-0 right-0 pr-3 flex items-center
                       text-on-surface-variant hover:text-on-surface transition-colors">
            {% include "icons/x.html" with size="14" %}
        </button>
        <div id="property-results"
             x-show="property.open && property.text.length > 0 && !property.id"
             class="absolute z-20 w-full top-full mt-1 bg-surface border border-outline
                    rounded-md shadow-lg overflow-hidden divide-y divide-outline
                    max-h-60 overflow-y-auto">
        </div>
    </div>
</div>
